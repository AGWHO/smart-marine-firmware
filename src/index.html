<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeaSafe Dashboard</title>

    <link rel="stylesheet" href="style.css" />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  </head>

  <body>
    <!-- ALERT BAR -->
    <div id="alert-banner" class="alert-banner hidden">
      ⚠️ System Warning Detected!
    </div>

    <div class="main-container">
      <!-- HEADER -->
      <div class="topbar">
        <h1>Marine Monitoring Dashboard</h1>
        <div id="system-status" class="status-badge">🟢 Online</div>
      </div>

      <!-- SUMMARY CARDS -->
      <div class="cards-container">
        <div class="card">
          <h3>Active Boats</h3>
          <p>01</p>
        </div>

        <div class="card">
          <h3>Connected Devices</h3>
          <p>02</p>
        </div>

        <div class="card" id="card-alerts">
          <h3>Alerts Today</h3>
          <p id="alerts-today">0</p>
        </div>

        <div class="card">
          <h3>Weather</h3>
          <p id="weather-condition">Fair</p>
        </div>
      </div>

      <!-- MAP -->
      <div class="map-container">
        <h2>Live GPS Tracking</h2>
        <div id="map"></div>
      </div>

      <!-- BOAT QUICK INFO -->
      <div class="cards-container">
        <div class="card clickable-card" onclick="goToBoatPage()">
          <h3>Fishing Boat</h3>

          <p>Status: <span id="boat-status">Active</span></p>
          <p>Lat: <span id="boat-lat">--</span></p>
          <p>Lng: <span id="boat-lng">--</span></p>

          <p class="view-details">View Details →</p>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
  </body>
</html>
