<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeaSafe - Boat Monitoring</title>

    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
  </head>

  <body>
    <!-- ALERT BANNER -->
    <div id="alert-banner" class="alert-banner hidden">
      ⚠️ Boat Warning Detected
    </div>

    <div class="main-container">
      <!-- HEADER -->
      <div class="topbar">
        <h1>Fishing Boat Monitoring</h1>
        <button class="back-button" onclick="goBackToDashboard()">
          ← Back
        </button>
      </div>

      <!-- SENSOR CARDS -->
      <div class="cards-container">
        <div class="card" id="card-status">
          <h3>Status</h3>
          <p id="detail-boat-status">Active</p>
        </div>

        <div class="card" id="card-wind">
          <h3>Wind</h3>
          <p id="detail-wind-status">--</p>
        </div>

        <div class="card" id="card-obstacle">
          <h3>Obstacle</h3>
          <p id="detail-obstacle-status">--</p>
        </div>

        <div class="card" id="card-distance">
          <h3>Distance</h3>
          <p id="detail-distance-status">--</p>
        </div>

        <div class="card" id="card-tilt-angle">
          <h3>Tilt Angle</h3>
          <p id="detail-tilt-angle">--</p>
        </div>

        <div class="card" id="card-tilt-status">
          <h3>Tilt Status</h3>
          <p id="detail-tilt-status">--</p>
        </div>

        <div class="card" id="card-shore">
          <h3>Distance to Shore</h3>
          <p id="distance-to-shore">--</p>
        </div>
      </div>

      <!-- MAP -->
      <div class="map-container">
        <h2>Live Boat Location</h2>
        <div id="boat-map"></div>
      </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="boat.js"></script>
  </body>
</html>
